<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFL Scout AI</title>
  <style>
    :root {
      --bg:       #0a0d14;
      --surface:  #111520;
      --border:   #1e2535;
      --gold:     #d4a20a;
      --gold-dim: #9a7208;
      --green:    #1a6b3c;
      --text:     #e8eaf0;
      --muted:    #8892a4;
      --user-bg:  #1a2540;
      --ai-bg:    #111a2e;
      --tag-bg:   #0d2040;
      --tag-border:#1e4080;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 2px solid var(--gold);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .logo {
      width: 42px;
      height: 42px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--gold);
    }

    .header-text p {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .status-dot {
      margin-left: auto;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2dba6a;
      box-shadow: 0 0 8px #2dba6a;
      flex-shrink: 0;
    }

    /* ── Main layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    aside {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    aside h2 {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      padding: 0 4px 6px;
      border-bottom: 1px solid var(--border);
    }

    .prompt-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.78rem;
      padding: 8px 10px;
      text-align: left;
      cursor: pointer;
      line-height: 1.4;
      transition: background 0.15s, border-color 0.15s;
    }

    .prompt-btn:hover {
      background: var(--user-bg);
      border-color: var(--gold-dim);
    }

    /* ── Chat area ── */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Message bubbles ── */
    .msg {
      display: flex;
      gap: 12px;
      max-width: 820px;
    }

    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg.user .avatar    { background: var(--gold-dim); }
    .msg.assistant .avatar { background: var(--green); }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.65;
      font-size: 0.92rem;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid #2a3a60;
      border-top-right-radius: 3px;
    }

    .msg.assistant .bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 3px;
    }

    .bubble p   { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble strong { color: var(--gold); }

    /* Sources */
    .sources {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .source-label {
      font-size: 0.68rem;
      color: var(--muted);
      margin-right: 2px;
    }

    .source-tag {
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      border-radius: 4px;
      color: #6ba3e0;
      font-size: 0.7rem;
      padding: 2px 8px;
    }

    /* Welcome screen */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 100%;
      text-align: center;
      color: var(--muted);
    }

    .welcome .big-icon { font-size: 56px; }

    .welcome h2 {
      font-size: 1.5rem;
      color: var(--text);
      font-weight: 700;
    }

    .welcome p {
      max-width: 420px;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      border-top-left-radius: 3px;
      width: fit-content;
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ── Input area ── */
    .input-area {
      padding: 16px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 820px;
      margin: 0 auto;
    }

    textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.92rem;
      font-family: inherit;
      padding: 11px 14px;
      resize: none;
      outline: none;
      max-height: 140px;
      min-height: 44px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: var(--gold-dim); }
    textarea::placeholder { color: var(--muted); }

    button#send {
      background: var(--gold);
      border: none;
      border-radius: 10px;
      color: #0a0d14;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      padding: 11px 20px;
      transition: background 0.15s;
      flex-shrink: 0;
      height: 44px;
    }

    button#send:hover:not(:disabled) { background: #e8b50e; }
    button#send:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

    .hint {
      text-align: center;
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 8px;
    }

    /* Responsive */
    @media (max-width: 640px) {
      aside { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🏈</div>
  <div class="header-text">
    <h1>NFL Scout AI</h1>
    <p>2026 Draft Prospect Analysis · Powered by Claude</p>
  </div>
  <div class="status-dot" title="Online"></div>
</header>

<div class="main">

  <aside>
    <h2>Quick Prompts</h2>
    <button class="prompt-btn" onclick="setPrompt(this)">Who is the top quarterback in this class?</button>
    <button class="prompt-btn" onclick="setPrompt(this)">Best edge rusher in the 2026 draft?</button>
    <button class="prompt-btn" onclick="setPrompt(this)">Which offensive tackles are first-round prospects?</button>
    <button class="prompt-btn" onclick="setPrompt(this)">Compare the top two wide receivers</button>
    <button class="prompt-btn" onclick="setPrompt(this)">Best value picks in the second round?</button>
    <button class="prompt-btn" onclick="setPrompt(this)">Top defensive backs in this class?</button>
    <button class="prompt-btn" onclick="setPrompt(this)">Which prospects have injury concerns?</button>
    <button class="prompt-btn" onclick="setPrompt(this)">Best running back for a zone-blocking scheme?</button>
    <button class="prompt-btn" onclick="setPrompt(this)">Who should the #1 overall pick be?</button>
    <button class="prompt-btn" onclick="setPrompt(this)">Underrated prospects who could outperform their draft slot?</button>
  </aside>

  <div class="chat-container">
    <div id="messages">
      <div class="welcome" id="welcome">
        <div class="big-icon">🏈</div>
        <h2>NFL Scout AI</h2>
        <p>Ask me anything about 2026 NFL draft prospects — scouting traits, scheme fits, comparisons, draft value, and more.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea
          id="input"
          rows="1"
          placeholder="Ask about any 2026 NFL draft prospect..."
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button id="send" onclick="sendMessage()">Send</button>
      </div>
      <p class="hint">Press Enter to send · Shift+Enter for new line</p>
    </div>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send');
  const welcomeEl  = document.getElementById('welcome');

  let history = [];
  let isLoading = false;

  function setPrompt(btn) {
    inputEl.value = btn.textContent.trim();
    autoResize(inputEl);
    inputEl.focus();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function formatText(text) {
    // Convert markdown-ish formatting to HTML
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/\n\n+/g, '</p><p>')
      .replace(/\n/g, '<br>');
  }

  function appendMessage(role, content, sources = []) {
    if (welcomeEl) welcomeEl.style.display = 'none';

    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '📋';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = `<p>${formatText(content)}</p>`;

    if (role === 'assistant' && sources.length > 0) {
      const sourceDiv = document.createElement('div');
      sourceDiv.className = 'sources';
      const label = document.createElement('span');
      label.className = 'source-label';
      label.textContent = 'Sources:';
      sourceDiv.appendChild(label);
      sources.forEach(s => {
        const tag = document.createElement('span');
        tag.className = 'source-tag';
        tag.textContent = s;
        sourceDiv.appendChild(tag);
      });
      bubble.appendChild(sourceDiv);
    }

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    scrollToBottom();
    return msg;
  }

  function showTyping() {
    const msg = document.createElement('div');
    msg.className = 'msg assistant';
    msg.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '📋';

    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<span></span><span></span><span></span>';

    msg.appendChild(avatar);
    msg.appendChild(typing);
    messagesEl.appendChild(msg);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    appendMessage('user', text);
    history.push({ role: 'user', content: text });

    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: history.slice(0, -1) }),
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: 'Server error' }));
        appendMessage('assistant', `⚠️ Error: ${err.detail || 'Something went wrong.'}`);
        return;
      }

      const data = await res.json();
      appendMessage('assistant', data.response, data.sources || []);
      history.push({ role: 'assistant', content: data.response });

      // Keep history manageable
      if (history.length > 20) history = history.slice(-20);

    } catch (err) {
      removeTyping();
      appendMessage('assistant', `⚠️ Network error: ${err.message}`);
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>

</body>
</html>
